services:
  - type: web
    name: martamodas-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

      - key: SEED_DEMO_DATA
        value: "false"
